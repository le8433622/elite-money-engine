version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://elite:elite@db:5432/elite_money_engine
      SECRET_KEY: change-me
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: elite_money_engine
      POSTGRES_USER: elite
      POSTGRES_PASSWORD: elite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
