version: '3.8'

services:
  api_service:
    build:
      context: .
      dockerfile: envs/Dockerfile.api_service
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://moneysystem_user:securepassword@db:5432/moneysystem_db
    depends_on:
      - db
    volumes:
      - .:/app
    restart: always

  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: moneysystem_user
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: moneysystem_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
